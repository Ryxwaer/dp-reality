services:
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - dp-reality
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  job-bazos:
    build:
      context: .
      dockerfile: services/jobs/bazos/Dockerfile
    env_file: .env
    environment:
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672/
      SCRAPE_INTERVAL_MINUTES: ${BAZOS_INTERVAL:-5}
      SCRAPE_PAGES: ${BAZOS_PAGES:-5}
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - dp-reality
    restart: unless-stopped
    develop:
      watch:
        - action: sync+restart
          path: ./services/jobs/bazos/src
          target: /app
        - action: rebuild
          path: ./services/jobs/bazos/requirements.txt

  job-sreality:
    build:
      context: .
      dockerfile: services/jobs/sreality/Dockerfile
    env_file: .env
    environment:
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672/
      SCRAPE_INTERVAL_MINUTES: ${SREALITY_INTERVAL:-10}
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - dp-reality
    restart: unless-stopped
    develop:
      watch:
        - action: sync+restart
          path: ./services/jobs/sreality/src
          target: /app
        - action: rebuild
          path: ./services/jobs/sreality/requirements.txt

  notification:
    build:
      context: .
      dockerfile: services/notification/Dockerfile
    env_file: .env
    environment:
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672/
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - dp-reality
    restart: unless-stopped
    develop:
      watch:
        - action: rebuild
          path: ./services/notification

  frontend:
    build:
      context: .
      dockerfile: services/frontend/Dockerfile
    env_file: .env
    environment:
      NUXT_MONGODB_URI: ${MONGODB_URI}
      NUXT_RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672/
      NUXT_SESSION_PASSWORD: ${NUXT_SESSION_PASSWORD}
      NUXT_UNSUBSCRIBE_SECRET: ${UNSUBSCRIBE_SECRET}
    depends_on:
      rabbitmq:
        condition: service_healthy
    ports:
      - "3000:3000"
    networks:
      - dp-reality
    restart: unless-stopped
    develop:
      watch:
        - action: sync
          path: ./services/frontend
          target: /app
          ignore:
            - node_modules/
            - .output/
            - .nuxt/
        - action: rebuild
          path: ./services/frontend/package.json

volumes:
  rabbitmq_data:

networks:
  dp-reality:
    name: dp-reality
    driver: bridge
