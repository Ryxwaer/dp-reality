apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 1h
  chart:
    spec:
      chart: kube-prometheus-stack
      version: 85.x.x
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
      interval: 1h
  install:
    crds: Create
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    crds:
      enabled: true
    cleanPrometheusOperatorObjectNames: true
    # Single-node deployment: no need for an Alertmanager (we have
    # no alerting routes yet) or for HA replicas. Keep node-exporter
    # and kube-state-metrics because Flagger / dashboards rely on
    # them. Keep Grafana for the thesis demo.
    alertmanager:
      enabled: false
    prometheus:
      # Service-level annotations make the Tailscale operator pick up
      # the Prometheus svc and publish it under `prometheus.<tailnet>.ts.net`,
      # reachable only from tailnet members. The chart applies these
      # to `kube-prometheus-stack-prometheus`.
      service:
        annotations:
          tailscale.com/expose: "true"
          tailscale.com/hostname: "prometheus"
      prometheusSpec:
        retention: 7d
        retentionSize: 10GiB
        # The chart auto-discovers ServiceMonitors with matching
        # release labels; loosen so any ServiceMonitor in any
        # namespace (e.g. ingress-nginx's) is picked up.
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        probeSelectorNilUsesHelmValues: false
        # Tempo's metrics-generator pushes service-graph + span-metrics
        # samples to Prometheus via the remote_write API (see
        # `flux/infra/prod/tempo.yaml`). The receiver is gated behind a
        # feature flag in Prometheus 2.x / 3.x — without it the writes
        # silently 404.
        enableRemoteWriteReceiver: true
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            memory: 1Gi
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: local-path
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 15Gi
    grafana:
      enabled: true
      defaultDashboardsTimezone: utc
      # On Fedora CoreOS the default `init-chown-data` busybox sidecar
      # can't `chown` Grafana's runtime-created PNG/CSV/PDF rendering
      # subdirs across SELinux MCS labels, so a second roll of the
      # Deployment ends in Init:Error. `fsGroup: 472` set by the chart
      # already handles ownership on PVC mount, so the init container
      # is redundant — disabling it cures the trap without sacrificing
      # anything.
      initChownData:
        enabled: false
      # The service is exposed on the tailnet via the Tailscale operator
      # (see flux/infra/prod/tailscale-operator.yaml). From any tailnet
      # member: http://grafana — public web never sees it. The tailnet
      # membership is our auth boundary, so we drop Grafana's own login
      # form and grant anonymous Admin to anyone who can reach the URL.
      # Rationale: Prometheus and Loki are already anonymous (Prometheus
      # has no built-in auth, Loki has `auth_enabled: false`), and the
      # admin password sat in a Kubernetes Secret that any kubectl-armed
      # user already could read. Tailscale device auth is the stronger
      # primitive — per-machine, revocable from the admin console, no
      # shared secret to leak.
      grafana.ini:
        auth.anonymous:
          enabled: true
          org_role: Admin
        auth:
          disable_login_form: true
          disable_signout_menu: true
      persistence:
        enabled: true
        storageClassName: local-path
        size: 2Gi
      service:
        type: ClusterIP
        annotations:
          tailscale.com/expose: "true"
          tailscale.com/hostname: "grafana"
      sidecar:
        dashboards:
          enabled: true
          searchNamespace: ALL
        # Watch every namespace for datasource ConfigMaps so Loki
        # (in `logging/`) and any future external metrics source can
        # plug in without modifying this HelmRelease. The matching
        # label is `grafana_datasource: "1"`.
        datasources:
          enabled: true
          searchNamespace: ALL
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 256Mi
    nodeExporter:
      enabled: true
    kubeStateMetrics:
      enabled: true
    kube-state-metrics:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          memory: 128Mi
    prometheus-node-exporter:
      resources:
        requests:
          cpu: 20m
          memory: 32Mi
        limits:
          memory: 64Mi
    # Disable scrapes for control-plane components that K3s does not
    # expose by default (the kube-controller-manager / scheduler /
    # etcd endpoints are baked into k3s and unreachable through the
    # usual /metrics endpoint).
    kubeControllerManager:
      enabled: false
    kubeScheduler:
      enabled: false
    kubeEtcd:
      enabled: false
    kubeProxy:
      enabled: false
