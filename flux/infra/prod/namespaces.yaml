apiVersion: v1
kind: Namespace
metadata:
  name: ingress-nginx
  labels:
    app.kubernetes.io/part-of: dp-reality
    # Flagger talks to the controller's HTTP API via the
    # ingress-nginx service; allowing the namespace to be scraped by
    # Prometheus is what lets Flagger compute 5xx rate / latency.
    pod-security.kubernetes.io/enforce: privileged
---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    app.kubernetes.io/part-of: dp-reality
---
apiVersion: v1
kind: Namespace
metadata:
  name: flagger-system
  labels:
    app.kubernetes.io/part-of: dp-reality
---
# Hosts the Tailscale Kubernetes operator and the per-Service proxy
# pods it spins up for each `tailscale.com/expose: "true"` annotation.
# The operator joins our personal tailnet using the OAuth credentials
# in `flux/infra/prod/secrets/tailscale-operator-oauth.yaml`.
apiVersion: v1
kind: Namespace
metadata:
  name: tailscale
  labels:
    app.kubernetes.io/part-of: dp-reality
---
# Loki + Promtail (centralised logs for the cluster). Co-located in
# its own namespace so the DaemonSet pod-scrape RBAC stays narrow.
apiVersion: v1
kind: Namespace
metadata:
  name: logging
  labels:
    app.kubernetes.io/part-of: dp-reality
