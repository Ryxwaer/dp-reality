# HelmRepository sources for the three infra charts. Each is polled
# every 30 minutes; HelmRelease objects reference these by name.
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: ingress-nginx
  namespace: flux-system
spec:
  interval: 30m
  url: https://kubernetes.github.io/ingress-nginx
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: prometheus-community
  namespace: flux-system
spec:
  interval: 30m
  url: https://prometheus-community.github.io/helm-charts
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: flagger
  namespace: flux-system
spec:
  interval: 30m
  url: https://flagger.app
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: tailscale
  namespace: flux-system
spec:
  interval: 30m
  url: https://pkgs.tailscale.com/helmcharts
---
# Grafana Labs' charts house Loki (logs) and Promtail (log shipper).
# Same repo also publishes Mimir / Alloy if we ever need them.
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: grafana
  namespace: flux-system
spec:
  interval: 30m
  url: https://grafana.github.io/helm-charts
---
# As of Feb 2026 the single-binary `tempo` chart moved out of
# `grafana/helm-charts` into the community-maintained
# `grafana-community/helm-charts`. The distributed chart
# (`tempo-distributed`) stays under the `grafana` source above; we
# only consume the single-binary variant.
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: grafana-community
  namespace: flux-system
spec:
  interval: 30m
  url: https://grafana-community.github.io/helm-charts
