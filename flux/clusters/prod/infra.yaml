# Cluster-level infrastructure (ingress-nginx, kube-prometheus-stack,
# Flagger). Lives in its own Kustomization so it can be reconciled
# independently from the app stack — useful when an infra change rolls
# the underlying Helm chart and we want to see it in `flux get
# kustomizations` separately from `dp-reality`.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 15m
  path: ./flux/infra/prod
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
