<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sreality bot configuration</title>
  <link rel="preconnect" href="https://rsms.me/" />
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  <style>
    :root {
      color-scheme: light;
      --bg: #ffffff;
      --surface: #fafafa;
      --surface-2: #f4f4f5;
      --border: #e4e4e7;
      --border-strong: #d4d4d8;
      --text: #18181b;
      --text-muted: #71717a;
      --primary: #00C16A;
      --primary-hover: #00A155;
      --primary-fg: #ffffff;
      --primary-soft: rgba(0, 193, 106, 0.12);
      --error: #dc2626;
      --error-soft: rgba(220, 38, 38, 0.10);
      --success: #16a34a;
      --radius: 6px;
      --radius-lg: 10px;
    }
    html.dark {
      color-scheme: dark;
      --bg: #18181b;
      --surface: #27272a;
      --surface-2: #3f3f46;
      --border: #3f3f46;
      --border-strong: #52525b;
      --text: #fafafa;
      --text-muted: #a1a1aa;
      --primary: #00DC82;
      --primary-hover: #00C16A;
      --primary-fg: #052E16;
      --primary-soft: rgba(0, 220, 130, 0.18);
      --error: #f87171;
      --error-soft: rgba(248, 113, 113, 0.12);
      --success: #4ade80;
    }
    html, body {
      margin: 0; padding: 0;
      background: transparent;
      color: var(--text);
      font-family: 'Public Sans', 'Inter', ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      font-size: 14px; line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    html.standalone, html.standalone body { background: var(--bg); }
    body { padding: 0; }
    html.standalone body { padding: 32px 24px; max-width: 760px; margin: 0 auto; }
    *, *::before, *::after { box-sizing: border-box; }

    .stack > * + * { margin-top: 16px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media (max-width: 560px) { .grid-2 { grid-template-columns: 1fr; } }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 18px 20px;
    }
    .card h3 { margin: 0 0 4px; font-size: 14px; font-weight: 600; }
    .card .desc { margin: 0 0 14px; font-size: 13px; color: var(--text-muted); }

    label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; }
    .help, .help-inline { display: block; font-size: 12px; color: var(--text-muted); margin-top: 4px; }

    .input, .select {
      width: 100%;
      padding: 7px 11px;
      font: inherit;
      color: inherit;
      background: var(--bg);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius);
      transition: border-color .12s, box-shadow .12s;
    }
    .input::placeholder { color: var(--text-muted); }
    .input:hover, .select:hover { border-color: var(--text-muted); }
    .input:focus, .select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px var(--primary-soft);
    }
    .input[type="number"] { font-variant-numeric: tabular-nums; }

    .btn {
      cursor: pointer;
      padding: 7px 14px;
      font: inherit;
      font-weight: 500;
      border: 1px solid var(--border-strong);
      background: var(--bg);
      color: inherit;
      border-radius: var(--radius);
      transition: background .12s, border-color .12s, color .12s;
    }
    .btn:hover { background: var(--surface-2); }
    .btn-ghost { background: transparent; border-color: transparent; }
    .btn-ghost:hover { background: var(--surface-2); }
    .btn-primary {
      background: var(--primary); color: var(--primary-fg); border-color: var(--primary);
    }
    .btn-primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; }
    .btn:focus-visible { outline: none; box-shadow: 0 0 0 2px var(--primary-soft); }

    .pill {
      cursor: pointer;
      padding: 4px 12px;
      font: inherit;
      font-size: 13px;
      border: 1px solid var(--border-strong);
      background: var(--bg);
      color: inherit;
      border-radius: 999px;
      transition: background .12s, color .12s, border-color .12s;
    }
    .pill:hover { background: var(--surface-2); }
    .pill[aria-pressed="true"] {
      background: var(--primary-soft);
      border-color: var(--primary);
      color: var(--primary);
    }
    .pills { display: flex; flex-wrap: wrap; gap: 6px; }

    .footer {
      display: flex; gap: 8px; justify-content: flex-end;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      margin-top: 4px;
    }

    .alert { padding: 10px 12px; border-radius: var(--radius); font-size: 13px; }
    .alert-error { background: var(--error-soft); color: var(--error); }
    .alert-success { background: var(--primary-soft); color: var(--success); }

    .field-row { display: flex; gap: 8px; align-items: stretch; }
    .field-row .input { flex: 1; }

    .combo { position: relative; }
    .combo-list {
      position: absolute; z-index: 20; left: 0; right: 0; top: calc(100% + 4px);
      background: var(--bg);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius);
      max-height: 240px; overflow-y: auto;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }
    .combo-list .opt {
      padding: 8px 12px;
      cursor: pointer;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
    }
    .combo-list .opt:last-child { border-bottom: none; }
    .combo-list .opt:hover, .combo-list .opt[aria-selected="true"] { background: var(--surface-2); }
    .combo-list .opt .typ { color: var(--text-muted); font-size: 11px; margin-left: 6px; text-transform: uppercase; letter-spacing: 0.04em; }
    .combo-list .empty { padding: 8px 12px; font-size: 12px; color: var(--text-muted); }
    .combo-chip {
      margin-top: 6px;
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px;
      background: var(--primary-soft);
      color: var(--primary);
      border: 1px solid var(--primary);
      border-radius: 999px;
      font-size: 13px;
      max-width: 100%;
    }
    .combo-chip-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .combo-chip-clear {
      border: none; background: transparent; color: inherit;
      cursor: pointer; font-size: 16px; line-height: 1; padding: 0 2px;
    }
    .combo-chip-clear:hover { color: var(--error); }
  </style>
</head>
<body>
  <div class="stack" id="root">
    <div class="card stack">
      <div>
        <h3>Quick import</h3>
        <p class="desc">Paste any sreality.cz filter URL and we&rsquo;ll fill the form below.</p>
      </div>
      <div class="field-row">
        <input id="import-url" class="input" type="url" placeholder="https://www.sreality.cz/hledani/prodej/byty?…" />
        <button id="import-btn" type="button" class="btn">Import</button>
      </div>
      <div id="import-msg" class="help-inline" aria-live="polite"></div>
    </div>

    <div class="card stack">
      <div>
        <h3>Filters</h3>
        <p class="desc">Empty fields = wildcard.</p>
      </div>
      <div class="grid-2">
        <div>
          <label for="prop">Property type</label>
          <select id="prop" class="select">
            <option value="">Any</option>
            <option value="1">Apartment (byt)</option>
            <option value="2">House (dům)</option>
          </select>
        </div>
        <div>
          <label for="trans">Transaction</label>
          <select id="trans" class="select">
            <option value="">Any</option>
            <option value="1">Sale</option>
            <option value="2">Rent</option>
          </select>
        </div>
      </div>
      <div id="dispo-block" hidden>
        <label>Disposition</label>
        <div class="pills" id="dispo-pills"></div>
        <span class="help-inline">Pick any combination, or leave empty to match all.</span>
      </div>
      <div class="grid-2">
        <div>
          <label for="pmin">Price min (CZK)</label>
          <input id="pmin" class="input" type="number" min="0" step="1000" placeholder="—" />
        </div>
        <div>
          <label for="pmax">Price max (CZK)</label>
          <input id="pmax" class="input" type="number" min="0" step="1000" placeholder="—" />
        </div>
      </div>
      <div>
        <label for="center-search">Centre region</label>
        <div class="combo" id="center-combo">
          <input id="center-search" class="input" type="text" placeholder="Type to search (e.g. Brno, Praha 5, Kunratice)\u2026" autocomplete="off" aria-autocomplete="list" aria-controls="center-list" />
          <div id="center-list" class="combo-list" role="listbox" hidden></div>
          <div id="center-chip" class="combo-chip" hidden>
            <span class="combo-chip-label" id="center-chip-label"></span>
            <button type="button" class="combo-chip-clear" id="center-chip-clear" aria-label="Clear centre">&times;</button>
          </div>
        </div>
        <span class="help-inline">Pick a municipality, district or ward. Required when a radius is set.</span>
      </div>
      <div>
        <label for="radius">Radius (km)</label>
        <input id="radius" class="input" type="number" min="1" max="200" step="1" placeholder="\u2014" />
        <span class="help-inline">Listings without coordinates are excluded when a radius is set.</span>
      </div>
    </div>

    <div id="form-msg"></div>

    <div class="footer">
      <button id="cancel-btn" type="button" class="btn btn-ghost">Cancel</button>
      <button id="submit-btn" type="button" class="btn btn-primary">Save</button>
    </div>
  </div>

  <script>
  (function () {
    'use strict';

    const APARTMENT_DISPO = [
      [2, '1+kk'], [3, '1+1'], [4, '2+kk'], [5, '2+1'],
      [6, '3+kk'], [7, '3+1'], [8, '4+kk'], [9, '4+1'],
      [10, '5+kk'], [11, '5+1'], [12, '6+ rooms'], [16, 'Atypical']
    ];
    const HOUSE_DISPO = [
      [33, 'Cottage (chata)'], [37, 'Family house'],
      [39, 'Villa'], [43, 'Cabin (chalupa)'],
      [44, 'Farm'], [48, 'Mobile home'], [54, 'Multi-generation']
    ];

    const params = new URLSearchParams(location.search);
    const configId = params.get('config_id') || '';
    const userId = params.get('user_id') || '';

    const isEmbedded = window.parent && window.parent !== window;
    const PARENT_ORIGIN = window.location.origin;
    if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
      document.documentElement.classList.add('dark');
    }
    if (!isEmbedded) {
      document.documentElement.classList.add('standalone');
    }

    let isEditMode = false;

    // Same-origin double-submit CSRF: the BFF sets a non-HttpOnly
    // `csrf-token` cookie; we echo it back on every state-changing call
    // through the /modules/* reverse proxy. Standalone hits the bot
    // directly so the cookie is absent and the header is omitted.
    function csrfHeaders() {
      var match = (document.cookie || '').match(/(?:^|; )csrf-token=([^;]*)/);
      return match ? { 'X-CSRF-Token': decodeURIComponent(match[1]) } : {};
    }
    function mergeHeaders(base) {
      var extra = csrfHeaders();
      var out = {};
      for (var k in base) if (Object.prototype.hasOwnProperty.call(base, k)) out[k] = base[k];
      for (var k2 in extra) if (Object.prototype.hasOwnProperty.call(extra, k2)) out[k2] = extra[k2];
      return out;
    }

    const els = {
      importUrl: document.getElementById('import-url'),
      importBtn: document.getElementById('import-btn'),
      importMsg: document.getElementById('import-msg'),
      prop: document.getElementById('prop'),
      trans: document.getElementById('trans'),
      dispoBlock: document.getElementById('dispo-block'),
      dispoPills: document.getElementById('dispo-pills'),
      pmin: document.getElementById('pmin'),
      pmax: document.getElementById('pmax'),
      centerSearch: document.getElementById('center-search'),
      centerList: document.getElementById('center-list'),
      centerChip: document.getElementById('center-chip'),
      centerChipLabel: document.getElementById('center-chip-label'),
      centerChipClear: document.getElementById('center-chip-clear'),
      radius: document.getElementById('radius'),
      submit: document.getElementById('submit-btn'),
      cancel: document.getElementById('cancel-btn'),
      formMsg: document.getElementById('form-msg'),
      submitBtn: document.getElementById('submit-btn')
    };

    let centerSelected = null; // { id, region_typ, name, label, lat, lon }

    function showCenterChip() {
      if (!centerSelected) {
        els.centerChip.hidden = true;
        els.centerSearch.style.display = '';
        return;
      }
      els.centerChipLabel.textContent = centerSelected.label;
      els.centerChip.hidden = false;
      els.centerSearch.style.display = 'none';
      hideCenterList();
      notifyResize();
    }
    function clearCenter() {
      centerSelected = null;
      els.centerSearch.value = '';
      showCenterChip();
    }
    els.centerChipClear.addEventListener('click', clearCenter);

    function hideCenterList() {
      els.centerList.hidden = true;
      els.centerList.innerHTML = '';
      notifyResize();
    }
    function renderCenterList(hits) {
      els.centerList.innerHTML = '';
      if (!hits || !hits.length) {
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = 'No matches.';
        els.centerList.appendChild(empty);
      } else {
        for (const h of hits) {
          const opt = document.createElement('div');
          opt.className = 'opt';
          opt.setAttribute('role', 'option');
          const labelSpan = document.createElement('span');
          labelSpan.textContent = h.label;
          const typSpan = document.createElement('span');
          typSpan.className = 'typ';
          typSpan.textContent = h.region_typ;
          opt.appendChild(labelSpan);
          opt.appendChild(typSpan);
          opt.addEventListener('mousedown', (e) => {
            e.preventDefault();
            centerSelected = {
              id: h.id,
              region_typ: h.region_typ,
              name: h.name,
              label: h.label,
              lat: h.lat,
              lon: h.lon
            };
            showCenterChip();
          });
          els.centerList.appendChild(opt);
        }
      }
      els.centerList.hidden = false;
      notifyResize();
    }

    let regionTimer = null;
    let regionSeq = 0;
    async function runRegions(q) {
      const seq = ++regionSeq;
      const endpoint = isEmbedded ? '/modules/bot-sreality/regions' : '/regions';
      const res = await fetch(endpoint + '?q=' + encodeURIComponent(q), {
        credentials: 'same-origin',
        headers: mergeHeaders({})
      });
      if (!res.ok) { hideCenterList(); return; }
      const data = await res.json();
      if (seq !== regionSeq) return;
      renderCenterList(data && data.hits ? data.hits : []);
    }
    els.centerSearch.addEventListener('input', () => {
      const q = els.centerSearch.value.trim();
      if (regionTimer) clearTimeout(regionTimer);
      if (q.length < 2) { hideCenterList(); return; }
      regionTimer = setTimeout(() => runRegions(q), 180);
    });
    els.centerSearch.addEventListener('blur', () => {
      setTimeout(hideCenterList, 120);
    });
    els.centerSearch.addEventListener('focus', () => {
      const q = els.centerSearch.value.trim();
      if (q.length >= 2) runRegions(q);
    });

    let dispoSelected = new Set();

    function renderDispo() {
      const main = els.prop.value;
      const list = main === '1' ? APARTMENT_DISPO : main === '2' ? HOUSE_DISPO : [];
      els.dispoBlock.hidden = !list.length;
      els.dispoPills.innerHTML = '';
      for (const [val, label] of list) {
        const b = document.createElement('button');
        b.type = 'button';
        b.className = 'pill';
        b.textContent = label;
        b.dataset.value = String(val);
        b.setAttribute('aria-pressed', dispoSelected.has(val) ? 'true' : 'false');
        b.addEventListener('click', () => {
          if (dispoSelected.has(val)) dispoSelected.delete(val);
          else dispoSelected.add(val);
          b.setAttribute('aria-pressed', dispoSelected.has(val) ? 'true' : 'false');
          notifyResize();
        });
        els.dispoPills.appendChild(b);
      }
      notifyResize();
    }
    els.prop.addEventListener('change', () => {
      dispoSelected = new Set();
      renderDispo();
    });

    function intOrNull(v) {
      const n = parseInt(v, 10);
      return Number.isFinite(n) ? n : null;
    }
    function applyParsed(p) {
      if (typeof p.category_main_cb === 'number') {
        els.prop.value = String(p.category_main_cb);
        dispoSelected = new Set();
        renderDispo();
      }
      if (typeof p.category_type_cb === 'number') els.trans.value = String(p.category_type_cb);
      if (Array.isArray(p.category_sub_cb)) {
        dispoSelected = new Set(p.category_sub_cb);
        renderDispo();
      }
      if (typeof p.price_min === 'number') els.pmin.value = String(p.price_min);
      if (typeof p.price_max === 'number') els.pmax.value = String(p.price_max);
      if (p.region_id && p.center && Array.isArray(p.center.coordinates) && typeof p.radius_km === 'number') {
        centerSelected = {
          id: p.region_id,
          region_typ: p.region_id.split(':')[0] || '',
          name: (p.region_label || '').split('·')[0].trim() || 'Selected region',
          label: (p.region_label || '').trim() || 'Selected region',
          lon: p.center.coordinates[0],
          lat: p.center.coordinates[1]
        };
        els.radius.value = String(p.radius_km);
        showCenterChip();
      }
    }

    async function loadExisting() {
      if (!configId) return;
      const url = isEmbedded
        ? '/modules/bot-sreality/configs/' + configId
        : '/configs/' + configId + '?user_id=' + encodeURIComponent(userId || '');
      const res = await fetch(url, { credentials: 'same-origin' });
      // 404 means create-mode (config_id was minted by the BFF but the
      // bot has never seen it before). 200 is edit-mode and we prefill.
      if (res.status === 404) {
        isEditMode = false;
        els.submit.textContent = 'Create bot';
        return;
      }
      if (!res.ok) return;
      const doc = await res.json();
      isEditMode = true;
      els.submit.textContent = 'Save changes';
      const c = doc.config || {};
      els.prop.value = c.category_main_cb != null ? String(c.category_main_cb) : '';
      els.trans.value = c.category_type_cb != null ? String(c.category_type_cb) : '';
      dispoSelected = new Set(Array.isArray(c.category_sub_cb) ? c.category_sub_cb : []);
      renderDispo();
      if (c.price_min != null) els.pmin.value = String(c.price_min);
      if (c.price_max != null) els.pmax.value = String(c.price_max);
      if (c.region_id && c.center && Array.isArray(c.center.coordinates) && c.radius_km != null) {
        centerSelected = {
          id: c.region_id,
          region_typ: String(c.region_id).split(':')[0] || '',
          name: (c.region_label || '').split('·')[0].trim() || 'Saved region',
          label: (c.region_label || '').trim() || 'Saved region',
          lon: c.center.coordinates[0],
          lat: c.center.coordinates[1]
        };
        els.radius.value = String(c.radius_km);
        showCenterChip();
      }
    }

    function showImportMsg(kind, text) {
      els.importMsg.className = 'alert ' + (kind === 'success' ? 'alert-success' : 'alert-error');
      els.importMsg.textContent = text;
      notifyResize();
    }
    function clearImportMsg() {
      els.importMsg.className = 'help-inline';
      els.importMsg.textContent = '';
      notifyResize();
    }

    els.importBtn.addEventListener('click', async () => {
      clearImportMsg();
      const url = els.importUrl.value.trim();
      if (!url) return;
      els.importBtn.disabled = true;
      try {
        const endpoint = isEmbedded ? '/modules/bot-sreality/parse-url' : '/parse-url';
        const res = await fetch(endpoint, {
          method: 'POST',
          headers: mergeHeaders({ 'Content-Type': 'application/json' }),
          credentials: 'same-origin',
          body: JSON.stringify({ url })
        });
        const data = await res.json();
        if (!data || !data.ok) {
          showImportMsg('error', (data && data.reason) || 'Could not parse URL.');
          return;
        }
        applyParsed(data.parsed || {});
        showImportMsg('success', 'Filters imported from URL.');
        els.importUrl.value = '';
      } finally {
        els.importBtn.disabled = false;
      }
    });
    els.importUrl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); els.importBtn.click(); }
    });

    function buildConfig() {
      const radiusVal = intOrNull(els.radius.value);
      const hasRadius = radiusVal !== null && radiusVal > 0 && !!centerSelected && !!centerSelected.id;
      return {
        category_main_cb: els.prop.value ? parseInt(els.prop.value, 10) : null,
        category_type_cb: els.trans.value ? parseInt(els.trans.value, 10) : null,
        category_sub_cb: Array.from(dispoSelected),
        price_min: intOrNull(els.pmin.value),
        price_max: intOrNull(els.pmax.value),
        region_id: hasRadius ? centerSelected.id : null,
        center: hasRadius
          ? { type: 'Point', coordinates: [centerSelected.lon, centerSelected.lat] }
          : null,
        radius_km: hasRadius ? radiusVal : null,
        region_label: hasRadius ? (centerSelected.label || null) : null
      };
    }

    function showFormError(text) {
      els.formMsg.className = 'alert alert-error';
      els.formMsg.textContent = text;
      notifyResize();
    }
    function showFormSuccess(text) {
      els.formMsg.className = 'alert alert-success';
      els.formMsg.textContent = text;
      notifyResize();
    }
    function clearFormMsg() {
      els.formMsg.className = '';
      els.formMsg.textContent = '';
    }

    els.submit.addEventListener('click', async () => {
      clearFormMsg();
      const config = buildConfig();
      if (isEmbedded) {
        els.submit.disabled = true;
        try {
          const saveRes = await fetch('/modules/bot-sreality/configs/' + configId, {
            method: 'POST',
            headers: mergeHeaders({ 'Content-Type': 'application/json' }),
            credentials: 'same-origin',
            body: JSON.stringify({ config: config })
          });
          if (!saveRes.ok) {
            const j = await saveRes.json().catch(() => ({}));
            showFormError(j.message || j.statusMessage || 'Could not save bot.');
            return;
          }
          window.parent.postMessage({ type: 'module:saved' }, PARENT_ORIGIN);
        } finally {
          els.submit.disabled = false;
        }
      } else {
        if (!userId) { showFormError('user_id query param is required when running standalone.'); return; }
        els.submit.disabled = true;
        try {
          const res = await fetch('/configs/' + configId + '?user_id=' + encodeURIComponent(userId), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ config: config })
          });
          if (!res.ok) {
            showFormError('Could not save: HTTP ' + res.status);
            return;
          }
          showFormSuccess('Saved.');
        } finally {
          els.submit.disabled = false;
        }
      }
    });

    els.cancel.addEventListener('click', () => {
      if (isEmbedded) window.parent.postMessage({ type: 'module:cancelled' }, PARENT_ORIGIN);
      else history.back();
    });

    let lastHeight = 0;
    function notifyResize() {
      if (!isEmbedded) return;
      const h = document.documentElement.scrollHeight;
      if (h === lastHeight) return;
      lastHeight = h;
      window.parent.postMessage({ type: 'module:resize', height: h }, PARENT_ORIGIN);
    }
    if (isEmbedded) {
      const ro = new ResizeObserver(notifyResize);
      ro.observe(document.documentElement);
      window.addEventListener('load', notifyResize);
    }

    window.addEventListener('message', (e) => {
      if (e.origin !== PARENT_ORIGIN) return;
      const data = e.data;
      if (!data || typeof data !== 'object') return;
      if (data.type === 'module:set-theme') {
        if (data.theme === 'dark') document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
      }
    });

    renderDispo();
    loadExisting().then(notifyResize);
  })();
  </script>
</body>
</html>
