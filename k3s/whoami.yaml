apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: whoami
  labels:
    app: whoami
spec:
  selector:
    matchLabels:
      app: whoami
  template:
    metadata:
      labels:
        app: whoami
    spec:
      containers:
      - name: whoami
        image: traefik/whoami
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: whoami
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  ports:
  - port: 8080
    targetPort: 80
    protocol: TCP
  selector:
    app: whoami
