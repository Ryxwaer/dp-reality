apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: dp-reality

resources:
  - ../../base

# Image tags. Phase 2 swaps `:latest` for sha-pinned tags maintained
# by Flux image-automation. For phase 1 the operator pulls `:latest`
# on every Deployment rollout.
images:
  - name: ghcr.io/ryxwaer/dp-reality/bot-bazos
    newTag: latest
  - name: ghcr.io/ryxwaer/dp-reality/bot-sreality
    newTag: latest
  - name: ghcr.io/ryxwaer/dp-reality/email-notifier
    newTag: latest
  - name: ghcr.io/ryxwaer/dp-reality/frontend
    newTag: latest
