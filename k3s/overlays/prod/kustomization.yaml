apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: dp-reality
resources:
  - ../../base
# Image tags. Flux image-automation watches GHCR for tags matching
# the policy in flux/clusters/prod/image-policies.yaml and commits the
# newest match back into the `newTag` value below — the `$imagepolicy`
# kyaml setter marker tells Flux which line to rewrite.
#
# The initial `newTag: latest` is the cold-start value: until Flux's
# image-reflector has scanned GHCR for the first time the cluster pulls
# `:latest`. After the first reconcile each `newTag` is overwritten
# with a sortable `main-<sha8>-<epoch>` tag.
images:
  - name: ghcr.io/ryxwaer/dp-reality/bot-bazos
    newTag: main-95a89e88-1778945634 # {"$imagepolicy": "flux-system:bot-bazos:tag"}
  - name: ghcr.io/ryxwaer/dp-reality/bot-sreality
    newTag: main-95a89e88-1778945636 # {"$imagepolicy": "flux-system:bot-sreality:tag"}
  - name: ghcr.io/ryxwaer/dp-reality/bot-bezrealitky
    newTag: main-e6da68bd-1778947502 # {"$imagepolicy": "flux-system:bot-bezrealitky:tag"}
  - name: ghcr.io/ryxwaer/dp-reality/email-notifier
    newTag: main-95a89e88-1778945630 # {"$imagepolicy": "flux-system:email-notifier:tag"}
  - name: ghcr.io/ryxwaer/dp-reality/geo-cz
    newTag: main-95a89e88-1778945631 # {"$imagepolicy": "flux-system:geo-cz:tag"}
  - name: ghcr.io/ryxwaer/dp-reality/frontend
    newTag: main-95a89e88-1778945627 # {"$imagepolicy": "flux-system:frontend:tag"}
