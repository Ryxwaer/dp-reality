apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mongodb
  namespace: dp-reality
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: mongodb
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app.kubernetes.io/component
                operator: In
                values: [bot, bff, notifier]
        # Phase 1 has one Mongo member; future replica-set members
        # need this self-allow to elect a primary.
        - podSelector: { matchLabels: { app.kubernetes.io/name: mongodb } }
      ports:
        - { protocol: TCP, port: 27017 }
  egress:
    # Phase 1 has one Mongo member; the rule below is the replica-set
    # gossip allow that becomes meaningful when mongodb-1 arrives.
    - to:
        - podSelector: { matchLabels: { app.kubernetes.io/name: mongodb } }
      ports:
        - { protocol: TCP, port: 27017 }
