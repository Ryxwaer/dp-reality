apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend
  namespace: dp-reality
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: frontend
  policyTypes: [Ingress, Egress]
  # Ingress traffic now arrives via ingress-nginx (Phase B): the
  # external NPM → NodePort 30090 (ingress-nginx) → this pod. The
  # source IP at the NetworkPolicy layer is the ingress-nginx pod IP
  # (cluster CIDR). The legacy direct NodePort 30080 path also still
  # works for fallback testing and arrives via kube-proxy with the
  # node IP as source.
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - ipBlock:
            # Fallback: NodePort 30080 traffic (legacy NPM target) and
            # any cluster-internal probe; constraining further would
            # break liveness probes.
            cidr: 0.0.0.0/0
      ports:
        - { protocol: TCP, port: 3000 }
  egress:
    - to:
        - podSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values: [bot-bazos, bot-sreality]
      ports:
        - { protocol: TCP, port: 8000 }
    - to:
        - podSelector: { matchLabels: { app.kubernetes.io/name: rabbitmq } }
      ports:
        - { protocol: TCP, port: 5672 }
    - to:
        - podSelector: { matchLabels: { app.kubernetes.io/name: mongodb } }
      ports:
        - { protocol: TCP, port: 27017 }
