# Single-member replica set in phase 1. Expansion to two members is
# `replicas: 2` + an `rs.add(...)` mongosh call once the RPi5 secondary
# pod is Running (see k3s/runbook.md "Adding the RPi5 worker").
#
# Why a replica set even with one member:
#   - the connection string the drivers use already includes
#     `?replicaSet=dp-rs`, so adding a second member is transparent
#     to clients;
#   - features like oplog change-streams and transactions require an
#     RS (even degenerate 1-member);
#   - `rs.initiate()` is run once per cluster lifetime — restarts
#     re-read /data/db state and rejoin the RS.
#
# The keyfile is required by mongod whenever a replica set runs with
# `--auth`. We materialise it through an init container because:
#   - Secret-mounted files end up owned by root:root with mode 0440,
#     and mongod refuses to use a keyFile whose mode is wider than
#     0600 or whose owner is not the mongod uid;
#   - kubelet `fsGroup` widens the mode rather than fixes the owner;
#   - init-container chown is the cleanest workaround.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: dp-reality
  labels:
    app.kubernetes.io/part-of: dp-reality
    app.kubernetes.io/component: db
    app.kubernetes.io/name: mongodb
spec:
  serviceName: mongodb
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mongodb
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: dp-reality
        app.kubernetes.io/component: db
        app.kubernetes.io/name: mongodb
    spec:
      securityContext:
        fsGroup: 999
      initContainers:
        - name: prepare-keyfile
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              set -eu
              cp /etc/mongo-keyfile-src/keyfile /etc/mongo-keyfile/keyfile
              chmod 0400 /etc/mongo-keyfile/keyfile
              chown 999:999 /etc/mongo-keyfile/keyfile
          volumeMounts:
            - { name: keyfile-src, mountPath: /etc/mongo-keyfile-src, readOnly: true }
            - { name: keyfile,     mountPath: /etc/mongo-keyfile }
      containers:
        - name: mongod
          image: mongo:7.0
          args:
            - "--replSet=dp-rs"
            - "--bind_ip_all"
            - "--keyFile=/etc/mongo-keyfile/keyfile"
            - "--auth"
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mongodb
                  key: MONGO_INITDB_ROOT_USERNAME
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongodb
                  key: MONGO_INITDB_ROOT_PASSWORD
          ports:
            - { name: mongo, containerPort: 27017 }
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - |
                  mongosh --quiet --eval 'db.adminCommand({ ping: 1 }).ok' --norc \
                    -u "$MONGO_INITDB_ROOT_USERNAME" -p "$MONGO_INITDB_ROOT_PASSWORD" \
                    --authenticationDatabase admin
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 8
          livenessProbe:
            tcpSocket: { port: 27017 }
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - { name: data,    mountPath: /data/db }
            - { name: keyfile, mountPath: /etc/mongo-keyfile, readOnly: true }
      volumes:
        - name: keyfile-src
          secret:
            secretName: mongodb
            items:
              - { key: keyfile, path: keyfile }
        - name: keyfile
          emptyDir: { medium: Memory, sizeLimit: 1Mi }
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: local-path
        resources:
          requests:
            storage: 5Gi
