apiVersion: v1
kind: ConfigMap
metadata:
  name: geo-cz
  namespace: dp-reality
  labels:
    app.kubernetes.io/part-of: dp-reality
    app.kubernetes.io/component: geo
    app.kubernetes.io/name: geo-cz
data:
  SERVICE_ID: geo-cz
  GEO_DATA_PATH: /data/CZ.txt
  # `missing`: seed only on the first boot against an empty collection.
  # `always`: re-upsert on every boot (idempotent; useful when bumping
  # the bundled dataset). `never`: skip the seeder entirely.
  SEED_MODE: missing
