apiVersion: v1
kind: ConfigMap
metadata:
  name: bot-bazos
  namespace: dp-reality
  labels:
    app.kubernetes.io/part-of: dp-reality
    app.kubernetes.io/component: bot
    app.kubernetes.io/name: bot-bazos
data:
  SERVICE_ID: bot-bazos
  DISPLAY_NAME: Bazos.cz
  BASE_URL: http://bot-bazos:8000
  SCRAPE_INTERVAL_MINUTES: "5"
  SCRAPE_PAGES: "5"
  # Bundled GeoNames CZ dump → seeded into the private `bazos_geo`
  # collection on first boot. See services/bot-bazos/src/geo.py.
  GEO_DATA_PATH: /data/CZ.txt
  GEO_SEED_MODE: missing
