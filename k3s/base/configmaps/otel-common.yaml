# Shared OpenTelemetry environment for every workload in
# `dp-reality/`. Every Deployment includes this ConfigMap via an
# additional `envFrom`, so the only thing that needs to differ per
# service is `OTEL_SERVICE_NAME` (set on each per-service ConfigMap).
#
# Endpoint resolves to the Tempo single-binary deployed by
# `flux/infra/prod/tempo.yaml` in the `tracing` namespace. The
# matching NetworkPolicy egress rule lives in
# `k3s/base/networkpolicies/tempo.yaml` so the default-deny policy
# does not silently drop OTLP traffic.
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-common
  namespace: dp-reality
  labels:
    app.kubernetes.io/part-of: dp-reality
data:
  OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo.tracing.svc.cluster.local:4317
  OTEL_EXPORTER_OTLP_PROTOCOL: grpc
  OTEL_RESOURCE_ATTRIBUTES: deployment.environment=prod,service.namespace=dp-reality
  # Switch the Python HTTP client/server instrumentations
  # (`opentelemetry-instrumentation-httpx`,
  # `opentelemetry-instrumentation-fastapi`) from the legacy
  # `http.method` / `http.url` attribute set to the stable OTel HTTP
  # semantic convention (`http.request.method`, `url.full`,
  # `server.address`). Tempo's `service_graphs` processor uses
  # `server.address` as the canonical peer label for outbound HTTP,
  # so without this opt-in the
  # `bot-bazos -> reality.bazos.cz` /
  # `bot-bezrealitky -> bezrealitky.cz` edges never get drawn. The
  # Node and Go OTel SDKs already default to the stable conv, so the
  # variable is a no-op for them and safe to set globally.
  OTEL_SEMCONV_STABILITY_OPT_IN: http
