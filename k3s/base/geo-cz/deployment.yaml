apiVersion: apps/v1
kind: Deployment
metadata:
  name: geo-cz
  namespace: dp-reality
  labels:
    app.kubernetes.io/part-of: dp-reality
    app.kubernetes.io/component: geo
    app.kubernetes.io/name: geo-cz
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: geo-cz
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: dp-reality
        app.kubernetes.io/component: geo
        app.kubernetes.io/name: geo-cz
    spec:
      containers:
        - name: geo-cz
          image: ghcr.io/ryxwaer/dp-reality/geo-cz:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef: { name: geo-cz }
            - secretRef:    { name: geo-cz }
          ports:
            - { name: http, containerPort: 8000 }
          readinessProbe:
            httpGet: { path: /healthz, port: 8000 }
            initialDelaySeconds: 5
            periodSeconds: 15
          livenessProbe:
            httpGet: { path: /healthz, port: 8000 }
            initialDelaySeconds: 30
            periodSeconds: 30
