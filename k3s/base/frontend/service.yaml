# NodePort 30080 is the inbound from nginx-proxy-manager (running in
# Docker on the same host). NPM proxies reality.ryxwaer.com to
# 127.0.0.1:30080 and keeps owning TLS. Cluster-internal callers
# (currently none — the BFF is only entered from outside) reach this
# Service via its ClusterIP regardless.
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: dp-reality
  labels:
    app.kubernetes.io/part-of: dp-reality
    app.kubernetes.io/component: bff
    app.kubernetes.io/name: frontend
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: frontend
  ports:
    - { name: http, port: 3000, targetPort: 3000, nodePort: 30080, protocol: TCP }
