apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: dp-reality
  labels:
    app.kubernetes.io/part-of: dp-reality
    app.kubernetes.io/component: bff
    app.kubernetes.io/name: frontend
spec:
  # `replicas` is deliberately omitted: Flagger scales this Deployment
  # to 0 once it has cloned the spec into `frontend-primary`, and
  # bumps it back to 1 during canary analysis. Keeping the field out
  # of the manifest avoids a Flux↔Flagger tug-of-war over the
  # `spec.replicas` setter (Kustomize SSA only claims fields present
  # in the manifest, so Flagger owns this one).
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: dp-reality
        app.kubernetes.io/component: bff
        app.kubernetes.io/name: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/ryxwaer/dp-reality/frontend:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef: { name: frontend }
            - secretRef:    { name: frontend }
          env:
            # Smoke-test marker so a no-op deploy triggers a Flagger
            # canary (any change to spec.template triggers analysis).
            # Safe to leave in place; the BFF ignores unknown env vars.
            - name: CANARY_SMOKE_TEST
              value: "phase-b-bootstrap-v3"
          ports:
            - { name: http, containerPort: 3000 }
          readinessProbe:
            httpGet: { path: /api/healthz, port: 3000 }
            initialDelaySeconds: 5
            periodSeconds: 15
          livenessProbe:
            httpGet: { path: /api/healthz, port: 3000 }
            initialDelaySeconds: 30
            periodSeconds: 30
