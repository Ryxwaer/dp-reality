apiVersion: v1
kind: Secret
metadata:
  name: geo-cz
  namespace: dp-reality
  labels:
    app.kubernetes.io/part-of: dp-reality
    app.kubernetes.io/component: geo
    app.kubernetes.io/name: geo-cz
type: Opaque
stringData:
  # MongoDB connection string. Same shape as the bot secrets; reuses
  # the cluster's `dp-reality` DB (collection: `geo_psc_cz`). Populate
  # via the same one-liner you used for the bots:
  #
  #   MONGO_URI="mongodb://${MONGO_USER}:${MONGO_PASS}@mongodb-0.mongodb:27017/dp-reality?replicaSet=dp-rs&authSource=admin"
  #   kubectl -n dp-reality create secret generic geo-cz \
  #     --from-literal=MONGODB_URI="$MONGO_URI" \
  #     --dry-run=client -o yaml | sops --encrypt /dev/stdin > k3s/base/secrets/geo-cz.yaml
  MONGODB_URI: REPLACE_ME
