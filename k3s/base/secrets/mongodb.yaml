apiVersion: v1
kind: Secret
metadata:
  name: mongodb
  namespace: dp-reality
  labels:
    app.kubernetes.io/part-of: dp-reality
    app.kubernetes.io/component: db
    app.kubernetes.io/name: mongodb
type: Opaque
stringData:
  MONGO_INITDB_ROOT_USERNAME: REPLACE_ME
  MONGO_INITDB_ROOT_PASSWORD: REPLACE_ME
  # 1024-byte base64 used by MongoDB for internal node-to-node auth
  # in replica-set mode. Even with one member today, the keyfile is
  # required so adding the RPi5 secondary later needs no Mongo
  # restart.
  keyfile: REPLACE_ME
