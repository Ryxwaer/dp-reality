stream_over_http_enabled: true
server:
  http_listen_port: 3200
  grpc_listen_port: 9095

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 24h

metrics_generator:
  registry:
    external_labels:
      source: tempo
      cluster: dp-reality-dev
  storage:
    path: /var/tempo/generator-wal
  traces_storage:
    path: /var/tempo/generator-traces
  processor:
    service_graphs:
      wait: 10s
      max_items: 10000
      peer_attributes:
        - peer.service
        - db.system
        - messaging.system
        - server.address
        - net.peer.name
      database_name_attributes:
        - db.system
    span_metrics:
      enable_target_info: true

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

overrides:
  defaults:
    metrics_generator:
      processors:
        - service-graphs
        - span-metrics
