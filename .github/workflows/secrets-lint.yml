name: secrets-lint

# Cheap pre-flight: refuse to merge / push if any Secret manifest under
# `k3s/base/secrets/*.yaml` was committed without SOPS encryption.
# The `sops:` metadata block at file level is the marker SOPS injects.
#
# Lives in its own workflow (not bundled with build-and-push) so:
#   - It runs on every PR touching secrets even if no service code changed.
#   - It does NOT trigger image rebuilds, which would otherwise loop with
#     Flux's image-automation commits to `k3s/overlays/prod/kustomization.yaml`.

on:
  push:
    branches: [main]
    paths:
      - 'k3s/base/secrets/**'
      - '.sops.yaml'
      - '.github/workflows/secrets-lint.yml'
  pull_request:
    paths:
      - 'k3s/base/secrets/**'
      - '.sops.yaml'
  workflow_dispatch:

jobs:
  verify-sops:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify all Secret manifests are SOPS-encrypted
        run: |
          fail=0
          for f in k3s/base/secrets/*.yaml; do
            [ -e "$f" ] || continue
            if ! grep -q '^sops:' "$f"; then
              echo "::error file=$f::Secret manifest is not SOPS-encrypted"
              fail=1
            fi
          done
          exit "$fail"
