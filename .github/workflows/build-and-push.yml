name: build-and-push

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
      - 'k3s/**'
      - '.github/workflows/build-and-push.yml'
  pull_request:
    paths:
      - 'k3s/base/secrets/**'
  workflow_dispatch:

# Lower-case repository owner is required for ghcr.io image names.
env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}/dp-reality

permissions:
  contents: read
  packages: write

jobs:
  secrets-lint:
    # Cheap pre-flight: refuse to merge a PR (or build a push) if any
    # k3s/base/secrets/*.yaml is committed without SOPS encryption.
    # The `sops:` metadata block at file level is the marker.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify all Secret manifests are SOPS-encrypted
        run: |
          fail=0
          for f in k3s/base/secrets/*.yaml; do
            [ -e "$f" ] || continue
            if ! grep -q '^sops:' "$f"; then
              echo "::error file=$f::Secret manifest is not SOPS-encrypted"
              fail=1
            fi
          done
          exit "$fail"

  build:
    needs: secrets-lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          # Bots + notifier are eligible to run on the ARM64 worker
          # (RPi5) per TODO/deployment/02-node-placement-and-resources.md
          # so we ship multi-arch manifests.
          - { name: bot-bazos,      dockerfile: services/bot-bazos/Dockerfile,      platforms: "linux/amd64,linux/arm64" }
          - { name: bot-sreality,   dockerfile: services/bot-sreality/Dockerfile,   platforms: "linux/amd64,linux/arm64" }
          - { name: email-notifier, dockerfile: services/email-notifier/Dockerfile, platforms: "linux/amd64,linux/arm64" }
          # The BFF is pinned to the amd64 Minisforum node per the same
          # node-placement spec. Building arm64 under QEMU on the
          # x86 GHA runner takes 40+ minutes (Nuxt is bundler-heavy);
          # skip until a real ARM64 BFF deployment is justified.
          - { name: frontend,       dockerfile: services/frontend/Dockerfile,       platforms: "linux/amd64" }
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase repository owner
        id: owner
        run: echo "lower=${REPO_OWNER,,}" >> "$GITHUB_OUTPUT"
        env:
          REPO_OWNER: ${{ github.repository_owner }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Sortable tag for Flux image-automation. The ImagePolicy in
      # flux/clusters/prod/image-policies.yaml extracts the trailing
      # epoch and picks the largest one.
      - name: Generate Flux build ID
        id: build_id
        run: |
          sha="${{ github.sha }}"
          short="${sha:0:8}"
          ts=$(date -u +%s)
          echo "tag=main-${short}-${ts}" >> "$GITHUB_OUTPUT"

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          platforms: ${{ matrix.service.platforms }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.lower }}/dp-reality/${{ matrix.service.name }}:latest
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.lower }}/dp-reality/${{ matrix.service.name }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.lower }}/dp-reality/${{ matrix.service.name }}:${{ steps.build_id.outputs.tag }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to:   type=gha,scope=${{ matrix.service.name }},mode=max
