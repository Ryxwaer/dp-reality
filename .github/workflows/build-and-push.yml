name: build-and-push

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
      - '.github/workflows/build-and-push.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}/dp-reality

permissions:
  contents: read
  packages: write

jobs:
  # The repo is the source of truth. Every directory under `services/`
  # that contains a Dockerfile is a deployable service, full stop —
  # no manual edits to this workflow needed when adding a new one.
  #
  # By default services are built multi-arch (amd64 + arm64) so they
  # can run on the future RPi5 worker (TODO/deployment/02). The
  # `frontend` is the documented exception: Nuxt's bundler under QEMU
  # takes 40+ minutes for arm64 on x86 GHA runners with no real-world
  # benefit, so it stays amd64-only until a real ARM64 BFF deployment
  # is justified. Add other names to AMD64_ONLY below if/when needed.
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.scan.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: scan
        run: |
          AMD64_ONLY="frontend"
          entries=()
          for df in services/*/Dockerfile; do
            name=$(basename "$(dirname "$df")")
            if echo " $AMD64_ONLY " | grep -q " $name "; then
              platforms="linux/amd64"
            else
              platforms="linux/amd64,linux/arm64"
            fi
            entries+=("{\"name\":\"$name\",\"dockerfile\":\"$df\",\"platforms\":\"$platforms\"}")
          done
          matrix=$(printf '%s\n' "${entries[@]}" | jq -sc '{include: .}')
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "Discovered matrix:"
          echo "$matrix" | jq .

  build:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase repository owner
        id: owner
        run: echo "lower=${REPO_OWNER,,}" >> "$GITHUB_OUTPUT"
        env:
          REPO_OWNER: ${{ github.repository_owner }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Sortable tag for Flux image-automation. The ImagePolicy in
      # flux/clusters/prod/image-policies.yaml extracts the trailing
      # epoch and picks the largest one.
      - name: Generate Flux build ID
        id: build_id
        run: |
          sha="${{ github.sha }}"
          short="${sha:0:8}"
          ts=$(date -u +%s)
          echo "tag=main-${short}-${ts}" >> "$GITHUB_OUTPUT"

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platforms }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.lower }}/dp-reality/${{ matrix.name }}:latest
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.lower }}/dp-reality/${{ matrix.name }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.lower }}/dp-reality/${{ matrix.name }}:${{ steps.build_id.outputs.tag }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to:   type=gha,scope=${{ matrix.name }},mode=max
