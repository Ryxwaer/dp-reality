name: build-and-push

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
      - '.github/workflows/build-and-push.yml'
  workflow_dispatch:

# Lower-case repository owner is required for ghcr.io image names.
env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}/dp-reality

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - { name: bot-bazos,      dockerfile: services/bot-bazos/Dockerfile }
          - { name: bot-sreality,   dockerfile: services/bot-sreality/Dockerfile }
          - { name: email-notifier, dockerfile: services/email-notifier/Dockerfile }
          - { name: frontend,       dockerfile: services/frontend/Dockerfile }
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase repository owner
        id: owner
        run: echo "lower=${REPO_OWNER,,}" >> "$GITHUB_OUTPUT"
        env:
          REPO_OWNER: ${{ github.repository_owner }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.lower }}/dp-reality/${{ matrix.service.name }}:latest
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.lower }}/dp-reality/${{ matrix.service.name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to:   type=gha,scope=${{ matrix.service.name }},mode=max
