name: build-and-push

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
      - '.github/workflows/build-and-push.yml'
  workflow_dispatch:

# Lower-case repository owner is required for ghcr.io image names.
env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}/dp-reality

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          # Bots + notifier are eligible to run on the ARM64 worker
          # (RPi5) per TODO/deployment/02-node-placement-and-resources.md
          # so we ship multi-arch manifests.
          - { name: bot-bazos,      dockerfile: services/bot-bazos/Dockerfile,      platforms: "linux/amd64,linux/arm64" }
          - { name: bot-sreality,   dockerfile: services/bot-sreality/Dockerfile,   platforms: "linux/amd64,linux/arm64" }
          - { name: email-notifier, dockerfile: services/email-notifier/Dockerfile, platforms: "linux/amd64,linux/arm64" }
          # The BFF is pinned to the amd64 Minisforum node per the same
          # node-placement spec. Building arm64 under QEMU on the
          # x86 GHA runner takes 40+ minutes (Nuxt is bundler-heavy);
          # skip until a real ARM64 BFF deployment is justified.
          - { name: frontend,       dockerfile: services/frontend/Dockerfile,       platforms: "linux/amd64" }
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase repository owner
        id: owner
        run: echo "lower=${REPO_OWNER,,}" >> "$GITHUB_OUTPUT"
        env:
          REPO_OWNER: ${{ github.repository_owner }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          platforms: ${{ matrix.service.platforms }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.lower }}/dp-reality/${{ matrix.service.name }}:latest
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.lower }}/dp-reality/${{ matrix.service.name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to:   type=gha,scope=${{ matrix.service.name }},mode=max
