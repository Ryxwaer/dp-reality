services:
  rabbitmq:
    container_name: dp-reality-rabbitmq
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - dp-reality
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  job-bazos:
    container_name: dp-reality-job-bazos
    build:
      context: .
      dockerfile: services/jobs/bazos/Dockerfile
    pull_policy: build
    image: dp-reality-job-bazos:latest
    environment:
      MONGODB_URI: ${MONGODB_URI}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672/
      SCRAPE_INTERVAL_MINUTES: 5
      SCRAPE_PAGES: 5
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - dp-reality
    restart: unless-stopped

  job-sreality:
    container_name: dp-reality-job-sreality
    build:
      context: .
      dockerfile: services/jobs/sreality/Dockerfile
    pull_policy: build
    image: dp-reality-job-sreality:latest
    environment:
      MONGODB_URI: ${MONGODB_URI}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672/
      SCRAPE_INTERVAL_MINUTES: 10
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - dp-reality
    restart: unless-stopped

  notification:
    container_name: dp-reality-notification
    build:
      context: .
      dockerfile: services/notification/Dockerfile
    pull_policy: build
    image: dp-reality-notification:latest
    environment:
      MONGODB_URI: ${MONGODB_URI}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672/
      MAIL_SMTP_SERVER: smtp.eu.mailgun.org
      MAIL_SMTP_PORT: 587
      MAIL_SMTP_LOGIN: ${MAIL_SMTP_LOGIN}
      MAIL_SMTP_PASSWORD: ${MAIL_SMTP_PASSWORD}
      MAIL_FROM_EMAIL: noreply@ryxwaer.com
      APP_BASE_URL: https://reality.ryxwaer.com
      BATCH_WINDOW_SECONDS: 300
      UNSUBSCRIBE_SECRET: ${UNSUBSCRIBE_SECRET}
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - dp-reality
    restart: unless-stopped

  frontend:
    container_name: dp-reality-frontend
    build:
      context: .
      dockerfile: services/frontend/Dockerfile
    pull_policy: build
    image: dp-reality-frontend:latest
    environment:
      NUXT_MONGODB_URI: ${MONGODB_URI}
      NUXT_RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672/
      NUXT_UNSUBSCRIBE_SECRET: ${UNSUBSCRIBE_SECRET}
      NUXT_SESSION_PASSWORD: ${NUXT_SESSION_PASSWORD}
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - dp-reality
    restart: unless-stopped

volumes:
  rabbitmq_data:

networks:
  dp-reality:
    name: dp-reality
    driver: bridge
