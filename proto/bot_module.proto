syntax = "proto3";

package botmodule;

option go_package = "dp-reality/proto/botmodule";

// Every scraper implements this service to participate as a bot module.
service BotModule {
  // Returns static metadata about this module (name, icon, capabilities).
  rpc GetManifest (Empty) returns (Manifest);

  // Parses a portal URL into a draft bot config for user confirmation.
  rpc ParseUrl (ParseUrlRequest) returns (ParseUrlResponse);

  // Returns the JSON schema describing the config form for this module.
  rpc GetConfigSchema (Empty) returns (ConfigSchema);

  // Returns overview stats for a specific user's bots on this module.
  rpc GetOverview (OverviewRequest) returns (OverviewResponse);
}

message Empty {}

// ── Manifest ──────────────────────────────────────────────────────────────────

message Manifest {
  string id            = 1;  // e.g. "sreality", "bazos"
  string display_name  = 2;  // e.g. "Sreality.cz"
  string description   = 3;
  string icon_url      = 4;  // optional URL to an icon/logo
  repeated string url_patterns = 5;  // glob patterns, e.g. "*.sreality.cz"
}

// ── ParseUrl ──────────────────────────────────────────────────────────────────

message ParseUrlRequest {
  string url = 1;
}

message ParseUrlResponse {
  string name                  = 1;
  repeated string cities       = 2;
  repeated string property_types = 3;
  repeated string price_types  = 4;
  optional int64  min_price    = 5;
  optional int64  max_price    = 6;
  repeated string dispositions = 7;
  repeated string warnings     = 8;  // anything the parser couldn't extract
}

// ── ConfigSchema ──────────────────────────────────────────────────────────────
// Returns a JSON Schema (as a JSON string) that the frontend renders
// into a dynamic form. Each module defines its own supported fields.

message ConfigSchema {
  string json_schema = 1;  // valid JSON Schema draft-07 string
}

// ── Overview ──────────────────────────────────────────────────────────────────

message OverviewRequest {
  string user_id = 1;
}

message OverviewResponse {
  int64  total_listings    = 1;
  int64  new_last_24h      = 2;
  repeated StatByField top_cities     = 3;
  repeated StatByField top_types      = 4;
  string extra_html        = 5;  // optional module-specific HTML snippet
}

message StatByField {
  string label = 1;
  int64  count = 2;
}
